baseURL = "https://www.opensourceway.blog"
title = "「开源之道」"
theme = "PaperMod"
languageCode = "zh-CN"
hasCJKLanguage = true
copyright = 'Copyright (c) 2016 - 2026, 「开源之道」·适兕; all rights reserved.'
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false
[pagination]
  pagerSize = 9
enableEmoji = true
enableRobotsTXT = true

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  author = "适兕"
  description = "致力于开源及其相关思想的传播与探讨"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowWordCount = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowAllPagesInArchive = true
  ShowPageNums = true
  ShowToc = true
  ShowPostNavLinks = true
  ShowShareButtons = false
  ShowFullTextinRSS = false
  mainSections = ["posts"]

  [params.assets]
    disableHLJS = true

  [params.label]
    text = "「开源之道」"
    icon = "/images/come_in_we_are_open.jpg"
    iconHeight = 35

  [params.homeInfoParams]
    Title = "「开源之道」"
    Content = """
致力于开源及相关思想、文化和经济的传播与探讨。

这里记录着对开源运动的观察、思考与翻译，涵盖开源历史、社区治理、商业模式、OSPO 演化、制度经济学等多个维度。**917+ 篇文章，持续更新中。**
"""

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    includeScore = true
    includeMatches = true
    findAllMatches = true
    ignoreLocation = true
    location = 0
    distance = 2000
    threshold = 0.35
    minMatchCharLength = 1
    keys = ["title", "permalink", "summary", "content"]

  [params.editPost]
    URL = "https://github.com/OCselected/ttoos/tree/master/content"
    Text = "建议修改"
    appendFilePath = true

[[params.socialIcons]]
  name = "Rss"
  url = "/index.xml"

